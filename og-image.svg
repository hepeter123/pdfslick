  <text x="82" y="455" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="rgba(255,255,255,0.65)">12 PDF tools. 8 languages. 100% free &amp; private.</text>
  <!-- URL -->
  <text x="82" y="540" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.4)">pdf-slick.com</text>
