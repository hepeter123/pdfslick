      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="50%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Logo -->
  <rect x="80" y="220" width="80" height="80" rx="18" fill="#E8573F"/>
